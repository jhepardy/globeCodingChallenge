image: mcr.microsoft.com/playwright:v1.59.1-noble

workflow:
  # Limit pipelines to merge requests, the default branch, manual runs, and schedules.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

variables:
  # Reuse the demo storefront by default and keep the npm cache inside the project workspace.
  CI: "true"
  BASE_URL: "https://demo.spreecommerce.org"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

stages:
  - test

cache:
  # Cache npm downloads between runs to shorten CI setup time.
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

playwright-e2e:
  stage: test
  timeout: 30m
  script:
    # The Playwright image already includes browsers, so only dependency install and test run are needed.
    - npm ci
    - npm run test:ci
  artifacts:
    # Preserve reports and traces even when the live storefront causes a test failure.
    when: always
    paths:
      - test-results/
    expire_in: 7 days
